spring.application.name=enginai-backend
server.port=8080

# ── MySQL local DB ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/enginai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── Google OAuth2 (fill in from Google Cloud Console) ─────────────────────────
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=change-this-to-a-256-bit-secret-in-prod
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# ── CORS (React dev server) ───────────────────────────────────────────────────
cors.allowed-origin=http://localhost:5173
